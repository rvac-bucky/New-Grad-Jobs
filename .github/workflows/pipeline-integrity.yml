name: Pipeline Integrity Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'scripts/update_jobs.py'
      - '.github/workflows/update-jobs.yml'
      - 'docs/jobs.json'
      - 'requirements.txt'

permissions: read-all
jobs:
  integrity:
    name: Pipeline Integrity Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Guard 1: Output path contract ────────────────────────────────────
      # The scraper MUST write to docs/jobs.json (GitHub Pages source).
      # If this drifts back to the repo root the live board goes dark silently.
      - name: Assert scraper writes to docs/jobs.json (not repo root)
        run: |
          python - <<'EOF'
          import ast, sys

          with open("scripts/update_jobs.py") as f:
              source = f.read()

          tree = ast.parse(source)
          violations = []

          for node in ast.walk(tree):
              # Look for: json_path = os.path.join(..., 'jobs.json')
              # where the path does NOT include 'docs'
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == 'json_path':
                          call = node.value
                          if isinstance(call, ast.Call):
                              args = [ast.unparse(a) for a in call.args]
                              joined = ' '.join(args)
                              if 'jobs.json' in joined and 'docs' not in joined:
                                  violations.append(f"  Line {node.lineno}: {ast.unparse(node)}")

          if violations:
              print("❌ FAIL: json_path assigned WITHOUT 'docs/' in the path.")
              print("   The scraper must write to docs/jobs.json (GitHub Pages source).")
              print("   Violations found:")
              for v in violations:
                  print(v)
              sys.exit(1)

          print("✅ Output path contract OK: json_path targets docs/jobs.json")
          EOF

      # ── Guard 2: Workflow stages correct files ────────────────────────────
      # The commit step must stage docs/ files, not root jobs.json / README.md.
      - name: Assert update-jobs.yml stages docs/ not root files
        run: |
          python - <<'EOF'
          import sys, re

          with open(".github/workflows/update-jobs.yml") as f:
              content = f.read()

          # Detect "git add jobs.json" or "git add README.md" without docs/ prefix
          bad_patterns = [
              r'git add\s+jobs\.json(?!\s|$)',        # git add jobs.json (root)
              r'git add\s+README\.md',                 # git add README.md
          ]
          violations = []
          for pat in bad_patterns:
              for m in re.finditer(pat, content, re.MULTILINE):
                  violations.append(f"  Found: {m.group().strip()!r}")

          if violations:
              print("❌ FAIL: update-jobs.yml stages root jobs.json or README.md.")
              print("   Must stage docs/jobs.json and docs/market-history.json instead.")
              for v in violations:
                  print(v)
              sys.exit(1)

          if 'git add docs/' not in content and 'git add docs/jobs.json' not in content:
              print("❌ FAIL: update-jobs.yml does not stage any docs/ files.")
              print("   Expected 'git add docs/jobs.json docs/market-history.json'")
              sys.exit(1)

          print("✅ Workflow stages correct files (docs/)")
          EOF

      # ── Guard 3: docs/jobs.json structure ────────────────────────────────
      # Validates the committed docs/jobs.json has the expected shape.
      - name: Validate docs/jobs.json structure
        run: |
          python - <<'EOF'
          import json, sys

          path = "docs/jobs.json"
          try:
              with open(path) as f:
                  data = json.load(f)
          except FileNotFoundError:
              print(f"⚠️  {path} not found — skipping structure check (new repo?)")
              sys.exit(0)
          except json.JSONDecodeError as e:
              print(f"❌ FAIL: {path} is not valid JSON: {e}")
              sys.exit(1)

          if not isinstance(data, dict):
              print(f"❌ FAIL: {path} root must be an object, got {type(data).__name__}")
              sys.exit(1)

          missing = [k for k in ('meta', 'jobs') if k not in data]
          if missing:
              print(f"❌ FAIL: {path} missing required keys: {missing}")
              sys.exit(1)

          if not isinstance(data['jobs'], list):
              print(f"❌ FAIL: data['jobs'] must be a list")
              sys.exit(1)

          job_count = len(data['jobs'])
          if job_count == 0:
              print("⚠️  WARNING: docs/jobs.json contains 0 jobs — may indicate a scraper failure")
              # Don't hard-fail: a legitimate run could yield 0 results during maintenance

          print(f"✅ docs/jobs.json structure OK ({job_count:,} jobs)")
          EOF

      # ── Guard 4: Scraper import health ───────────────────────────────────
      # Catches broken imports, missing dependencies, top-level syntax errors
      # that py_compile misses (e.g. circular imports, bad __all__ references).
      - name: Scraper import health check
        run: |
          python - <<'EOF'
          import sys, importlib.util, pathlib

          spec = importlib.util.spec_from_file_location(
              "update_jobs", pathlib.Path("scripts/update_jobs.py")
          )
          mod = importlib.util.module_from_spec(spec)
          try:
              spec.loader.exec_module(mod)
          except SystemExit:
              pass  # script calls sys.exit() at module level — that's fine
          except Exception as e:
              print(f"❌ FAIL: importing update_jobs raised: {type(e).__name__}: {e}")
              sys.exit(1)

          print("✅ update_jobs.py imports cleanly")
          EOF

      # ── Guard 5: Scraper must not write README.md ─────────────────────────
      # README.md is a static, human-maintained document.
      # The scraper must only write to docs/ (jobs.json, feed.xml, etc.).
      # This guard catches any drift that re-introduces README generation.
      - name: Assert scraper does not write README.md
        run: |
          python - <<'EOF'
          import ast, sys

          with open("scripts/update_jobs.py") as f:
              source = f.read()

          tree = ast.parse(source)
          violations = []

          for node in ast.walk(tree):
              # Catch: open(...'README.md'...) or open(readme_path, ...)
              # where the path resolves to README.md
              if isinstance(node, ast.Call):
                  fn = node.func
                  fn_name = ""
                  if isinstance(fn, ast.Name):
                      fn_name = fn.id
                  elif isinstance(fn, ast.Attribute):
                      fn_name = fn.attr
                  if fn_name == "open" and node.args:
                      arg_str = ast.unparse(node.args[0])
                      if "README" in arg_str or "readme" in arg_str.lower():
                          violations.append(f"  Line {node.lineno}: open({arg_str!r}, ...)")

          # Also reject presence of generate_readme function definition
          for node in ast.walk(tree):
              if isinstance(node, ast.FunctionDef) and node.name == "generate_readme":
                  violations.append(f"  Line {node.lineno}: function 'generate_readme' is defined")

          if violations:
              print("❌ FAIL: update_jobs.py contains README.md write logic.")
              print("   README.md is static; the scraper must not generate or overwrite it.")
              for v in violations:
                  print(v)
              sys.exit(1)

          print("✅ Scraper does not write README.md")
          EOF
