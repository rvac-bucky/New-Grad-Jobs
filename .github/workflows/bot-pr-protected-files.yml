name: Protected Files Check

# Hard block: fails CI if a community PR touches README.md or jobs.json.
# Both files are protected. README.md is no longer auto-generated by the scraper (see update_jobs.py).
# jobs.json is auto-generated every 5 minutes by the scraper.
# A manual edit will be overwritten within minutes of merging.
# Exempts the maintainer and the GitHub Actions bot (scraper commits).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: read-all
jobs:
  protected-files:
    name: Protected Files Check
    permissions:
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Check for auto-generated file edits
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const prNumber = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const logCommentWarning = (action, error) => {
              console.warn(
                `Unable to ${action} PR comment (likely fork token restrictions): ${error.message}`
              );
            };

            // Maintainer and the scraper bot are allowed to touch these
            const EXEMPT_USERS = ['ambicuity', 'github-actions[bot]', 'dependabot[bot]'];
            if (EXEMPT_USERS.includes(author)) {
              console.log(`Exempt user ${author} — skipping protected files check.`);
              return;
            }

            const PROTECTED = ['README.md', 'docs/jobs.json'];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber
            });

            const violations = files
              .map(f => f.filename)
              .filter(name => PROTECTED.includes(name));

            if (violations.length === 0) {
              console.log('No protected files touched. Check passed.');

              // Remove prior failure comment if it exists (clean commit fixed it)
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: prNumber
              });
              const prior = comments.data.find(c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.includes('auto-generated')
              );
              if (prior) {
                try {
                  await github.rest.issues.deleteComment({
                    owner, repo, comment_id: prior.id
                  });
                } catch (error) {
                  logCommentWarning('delete', error);
                }
              }
              return;
            }

            // Post failure comment
            const bold = (s) => `**${s}**`;
            const fileList = violations.map(f => `- \`${f}\``).join('\n');
            const body = [
              '## ❌ PR Touches Auto-Generated Files',
              '',
              `@${author}, this PR modifies file(s) that are **auto-generated** by the scraper`,
              'every 5 minutes. Any manual edits will be overwritten within minutes of merging.',
              '',
              bold('Files that must not be manually edited:'),
              fileList,
              '',
              '| File | Why it is protected |',
              '|------|---------------------|',
              '| `README.md` | Previously auto-generated by `update_jobs.py`; now skipped by the scraper. Regenerate via a dedicated workflow or maintain manually. Edits are restricted to maintainers and blocked for non-exempt contributors. |',
              '| `docs/jobs.json` | Auto-generated job data — source of truth for the portal |',
              '',
              bold('How to fix:'),
              '```bash',
              'git checkout HEAD~1 -- README.md docs/jobs.json',
              '# or, if you edited them locally:',
              'git checkout origin/main -- README.md docs/jobs.json',
              'git push',
              '```',
              '',
              'This check will pass automatically once those files are removed from the diff.',
            ].join('\n');

            // Post or update
            const allComments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const existing = allComments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('auto-generated')
            );

            try {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber, body
                });
              }
            } catch (error) {
              logCommentWarning('create or update', error);
            }

            core.setFailed(
              `PR touches auto-generated file(s): ${violations.join(', ')}. ` +
              `Run: git checkout origin/main -- ${violations.join(' ')}`
            );
